services:
  db:
    image: postgres:13
    platform: linux/amd64
    environment:
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_DB=postgres
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo:
    image: odoo:15
    platform: linux/amd64
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./flf_perfo:/mnt/extra-addons
    command: ["odoo", "--addons-path=/mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons"]
    restart: unless-stopped

  backend2:
    build:
      context: ./backend2
      dockerfile: Dockerfile
    platform: linux/amd64
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - NODE_ENV=production
      - ODOO_URL=${BACKEND2_ODOO_URL:-https://dev.odoo15.emuaport.com/}
      - ODOO_DB=${BACKEND2_ODOO_DB}
      - ODOO_USERNAME=${BACKEND2_ODOO_USERNAME}
      - ODOO_PASSWORD=${BACKEND2_ODOO_PASSWORD}
      - ODOO_API_KEY=${BACKEND2_ODOO_API_KEY:-}
      - JWT_SECRET=${BACKEND2_JWT_SECRET}
      - JWT_EXPIRES_IN=${BACKEND2_JWT_EXPIRES_IN:-8h}
      - CREDENTIALS_ENCRYPTION_KEY=${BACKEND2_CREDENTIALS_ENCRYPTION_KEY}
      - LOG_LEVEL=${BACKEND2_LOG_LEVEL:-info}
    volumes:
      - ./backend2/logs2:/app/logs2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  odoo-db-data:
  odoo-web-data:

